aid: cvent-registration
name: Cvent Registration
x-type: company
description: >-
  Cvent Registration is the event registration product within the Cvent
  Event Cloud, providing online registration websites, attendee data
  capture, payment processing, registration travel, group registration,
  custom field collection, and badge / on-site check-in workflows.
  Registration data is exposed programmatically through the unified
  Cvent Platform REST API at api-platform.cvent.com (OAuth 2.0 client
  credentials), with a dedicated Registration Guide on the Cvent
  developer portal. Real-time registration changes are also delivered
  through Cvent Webhooks. Earlier integrations relied on the legacy
  Cvent SOAP API.

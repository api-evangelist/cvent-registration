apis:
  - aid: cvent-registration:rest-api
    name: Cvent Registration REST API
    description: >-
      The Cvent Registration REST API is the registration surface of
      the unified Cvent Platform REST API. It allows integrations to
      create and manage events, registration types, fees, sessions,
      contacts, attendees, registrations, payments, and travel data.
      Authentication uses OAuth 2.0 client credentials with the token
      endpoint at api-platform.cvent.com/ea/oauth2/token. Detailed
      registration workflows are documented in the Registration Guide.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/rest-api/guides/registration-guide
    baseURL: https://api-platform.cvent.com
    tags:
      - Attendees
      - Contacts
      - Events
      - OAuth 2.0
      - Payments
      - Registration
      - REST
      - Sessions
      - Ticketing
    properties:
      - type: Documentation
        url: https://developers.cvent.com/docs/rest-api/overview
      - type: RegistrationGuide
        url: https://developers.cvent.com/docs/rest-api/guides/registration-guide
      - type: APIReference
        url: https://developers.cvent.com/docs/rest-api/reference/reference
      - type: Authentication
        url: https://developers.cvent.com/docs/rest-api/explanation/authentication
      - type: OAuthTokenEndpoint
        url: https://api-platform.cvent.com/ea/oauth2/token
      - type: ChangeLog
        url: https://developers.cvent.com/docs/rest-api/changelog
  - aid: cvent-registration:webhooks
    name: Cvent Registration Webhooks
    description: >-
      Cvent Webhooks deliver real-time push notifications when
      registration, attendee, session, and meeting request events occur
      in Cvent. Webhook subscribers receive event payloads at a
      configured URL, enabling reactive integration with CRM, marketing
      automation, data warehouses, and analytics without polling the
      REST API.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.cvent.com/docs/webhooks/overview
    tags:
      - Attendees
